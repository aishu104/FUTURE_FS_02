<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexusCRM - Tasks</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="app-container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>NexusCRM</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="leads.html">Leads</a>
    <a href="contacts.html">Contacts</a>
    <a href="deals.html">Deals</a>
    <a class="active" href="tasks.html">Tasks</a>
    <a href="calendar.html">Calendar</a>
    <a href="reports.html">Reports</a>
    <a href="settings.html">Settings</a>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1>Tasks</h1>

    <div class="top-bar">
      <input type="text" id="searchTasks" placeholder="Search tasks..." />
      <button onclick="openTaskForm()">+ Add Task</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Task</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Due Date</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="taskTable"></tbody>
    </table>

  </div>

</div>

<!-- FORM -->
<div id="taskPopup" class="popup hidden">
  <div class="popup-content">
    <h2>Task</h2>

    <input type="hidden" id="taskId" />

    <input type="text" id="tname" placeholder="Task Name" />

    <select id="tpriority">
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>

    <select id="tstatus">
      <option>Pending</option>
      <option>Completed</option>
    </select>

    <input type="date" id="tdue" />

    <button onclick="saveTask()">Save</button>
    <button onclick="closeTaskForm()">Cancel</button>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/tasks.js"></script>

</body>
</html>
